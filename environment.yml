# conda environment requirements
channels:
- conda-forge
- fastai
- pytorch
dependencies:
# jatic-ri
- maite=0.6.0
- dataeval=0.71.0
- panel=1.4.5
- pybsm >=0.8.0  # optional dep for nrtk, required here
- pytorch>=2.2.0
- torchvision>=0.17.0
- tensorflow=2.15.0               # required to avoid 2.15.1 which is unavailable for nebari
- tensorflow-datasets=4.8.3
- torchmetrics=1.4.0
- matplotlib=3.8.4
- tensorflow-probability=0.23.0
- libgl=*                         # Supplementary requirement for opencv-python-headless. Needed for yolov5 to successfully import.
- opencv-python-headless=4.9.0.80
- nrtk=0.12.0
- xaitk-jatic=0.2.0
- openjdk=17.0.9                  # pin required. Needed for pyspark in MORSE RealLabel and Survivor Test Stages.
- pip
- pip:
  - gradient @ git+https://gitlab-ci-token:${PRIVATE_TOKEN}@gitlab.jatic.net/jatic/morse/gradient.git@0.10.1
  - reallabel @ git+https://gitlab-ci-token:${PRIVATE_TOKEN}@gitlab.jatic.net/jatic/morse/reallabel.git@0.5.0
  - survivor @ git+https://gitlab-ci-token:${PRIVATE_TOKEN}@gitlab.jatic.net/jatic/morse/survivor.git@0.3.0
  - yolov5==7.0.0                 # Needed to run tests using example MAITE-wrapped objects.
  - huggingface-hub>=0.12.0       # Needed for yolov5 to successfully import.
  - urllib3<2.1                   # Needed for parity with pyproject.toml's yolov5 / botocore issues.
# test
- pytest  # TODO: sort out dev/test deps properly
- pytest-cov
# linting and formatting
- pre-commit
- pyright
# docs
- mkdocs
