[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "jatic-ri"
version = "0.1.2"
description = "JATIC Reference Implementation"
readme = "README.md"
license = { text = "TBD" }
authors = [
    { name = "JATIC Developers" },
]
keywords = [
    "jatic",
    "artificial intelligence",
    "testing and evaluation",
    "object detection",
    "image classification",
]
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
requires-python = ">=3.10, <3.12"                    # required by SDP

dynamic = ["dependencies"]

[tool.conda-lock]
channels = ['conda-forge', 'fastai']
platforms = ['linux-64']

[tool.conda-lock.dependencies]
# conda only dependencies (usually system dependencies)
python = ">=3.10,<3.12"                            # required by SDP
openjdk = "=17"                                    # pyspark 3.x suports Java 8/11/17
cudatoolkit = "*"                                  # necessary to suppress conda-lock warning
timm = ">=1.0.7"
libgl = "*"
libopengl = "*"                                    # patch for a missing dependency from something (opencv?) in conda-forge
pip = "*"                                          # ensure pip is available for conda-lock
poetry = "==2.1.2"                                 # allow user to still use the `make check-conda` pre-commit hook

[tool.poetry]
packages = [{ include = "jatic_ri", from = "src" }]

[tool.poetry.dependencies]
reallabel = {git = "https://gitlab.jatic.net/jatic/morse/reallabel.git", tag="0.6.4"}
gradient = {git = "https://gitlab.jatic.net/jatic/morse/gradient.git", tag="0.12.2"}
survivor = {git = "https://gitlab.jatic.net/jatic/morse/survivor.git", tag="0.4.6"}
dataeval = "==0.92.3"                 
maite = "0.8.2"
nrtk = "==0.25.0"
pybsm = ">=0.12.0"                                 # optional dep for nrtk, required here
xaitk-saliency = "==0.12.0"
xaitk-jatic = "==0.7.0"
# external deps
holoviews = ">=1.20.0"                             # arbitrary, required for panel pipelines
httpx = ">=0.28.1"                                 # arbitrary, needed to run visdrone model
jupyterlab = ">=4.3.5"                             # arbitrary, required for serving panel notebooks via CLI
matplotlib = ">=3.8.4"                             # arbitrary, required by panel
more-itertools = ">=10.0"                          # arbitrary, used by linting test stage
nbconvert = ">=7.16.6"                             # arbitrary, required for serving panel notebooks via CLI
numba = ">=0.60.0"                                 # arbitrary, needed to run visdrone model
opencv-python-headless = ">=4.9.0.80"              # necessary lower pin, required by nrtk usage here
pandas = ">=2"                                     # arbitrary, required for data handling
panel = ">=1.5.1,<=1.7.1"                          # necessary for FileDropper widget, and for progression of dashboards
pillow = ">=11.0.0"                                # arbitrary
pydantic = ">=2.0.0"                               # arbitrary
streamz = ">=0.6.4"                                # arbitrary
torch = ">=2.2.0"                                  # necessary lower pin (at least >=2.2.0 for security)
torchmetrics = ">=1.4.0"                           # arbitrary, required for metric computation
torchvision = ">=0.17.0"                           # arbitrary, required for models
zstandard = ">=0.23.0"                             # arbitrary, used for zip compression of json
smqtk-detection = ">=0.22.0"                       # necessary lower pin for running VisDrone model on Mac
transformers = {extras = ["timm"], version = ">=4.48.0,!=4.51.0"}  # necessary lower pin for xaitk panel app for security vulnerability

[tool.poetry.group.dev.dependencies]
pre-commit = ">=3.0.0"                             # arbitrary
pyright = {extras = ["nodejs"], version = ">=1.1.400,!=1.1.401"}  # necessary, typechecker will fail for some versions, https://github.com/microsoft/pyright/issues/10487
pyspark = ">=3.5.3"                                # arbitrary
pytest = ">=8.3.0"                                 # necessary lower pin for compatibility
pytest-cov = ">=4.0.0"                             # arbitrary
pytest-mock = ">=3.6.1"                            # arbitrary
# This is not needed by us, but required to avoid a critical vulnerability warning
# See https://gitlab.jatic.net/jatic/reference-implementation/reference-implementation/-/issues/201#note_176213 for details
virtualenv = ">=20.26.6"
conda-lock = ">=3.0.3"                             # necessary, used to update conda-lock.yml
ruamel-yaml = ">=0.17.21"                          # necessary, for comment-preserving YAML manipulation

[tool.poetry.group.docs.dependencies]
mkdocs = ">=1.6.1"                                 # arbitrary
mkdocs-jupyter = ">=0.25"                          # arbitrary
mkdocs-material = ">=9.6.4"                        # arbitrary
pymdown-extensions = ">=10.14.3"                   # arbitrary

[project.optional-dependencies]
unsupported = ["heart-library==0.7.0"]

[tool.bandit]
exclude_dirs = [
    "tests", "scripts"
]

[tool.pyright]
reportMissingImports = "warning"
reportUnnecessaryTypeIgnoreComment = "error"
include = [
    "src",
    "tests",
]
exclude = [
    "**/_panel",
]

[tool.ruff]
exclude = [
  "environment*",
]

line-length = 120
indent-width = 4
target-version = "py310"
extend-include = ["*.ipynb"]

[tool.ruff.lint]
select = ["F", "E", "W", "C90", "I", "N", "D1", "D200", "D201", "D211", "D403", "D419", "UP",
          "YTT", "ANN", "S",  "BLE", "B", "A", "COM", "C4", "T10", "ISC", "ICN", "PYI", "PT", "Q",
          "RSE", "RET", "SLF", "SIM", "TID252", "ARG", "PD", "FLY", "NPY", "RUF027",
          "RUF100", "PERF"]
ignore = ["ANN101", "ANN102", "ANN401", "COM812", "ISC001", "UP038"]
fixable = ["ALL"]
unfixable = []
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.extend-per-file-ignores]
"**/tests/*" = [
    "ANN",
    "D",
    "ARG",
    "SIM",
    "C90",
    "SLF001",
    "S101",
    "A001",
    "E501",
    "PT007",
    "PT011",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.ruff.lint.isort]
known-first-party = ["jatic_ri"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra --tb=short -m 'not (real_data or unsupported)'"
testpaths = ["tests"]
markers = [
    "real_data",
    "unsupported",
    "heart"
]
filterwarnings = [
    "error",
    "ignore::ResourceWarning",
    "ignore:`torch.cuda.amp.autocast.*` is deprecated.:FutureWarning",
    "ignore:User provided device_type of 'cuda', but CUDA is not available. Disabling:UserWarning",
    "ignore:More than \\d+ figures have been opened:RuntimeWarning",
    "ignore:pkg_resources is deprecated as an API:DeprecationWarning",
    "ignore:The 'strip_cdata' option of HTMLParser:DeprecationWarning",
    "ignore:.*?not importable:UserWarning",
    "ignore:.*?`scipy.ndimage.filters` namespace is deprecated:DeprecationWarning",
    "ignore:A custom validator is returning a value other than `self`:UserWarning",
    "ignore:distutils Version classes are deprecated:DeprecationWarning",
    "ignore:is_datetime64tz_dtype is deprecated:DeprecationWarning",
    "ignore:The operator .* is not currently supported on the MPS backend:UserWarning",
    "ignore:A new version of Albumentations is available",
    "ignore:pkg_resources is deprecated as an API:UserWarning",
    "ignore:The 'shapely.geos' module is deprecated.*:DeprecationWarning",  # TODO: investigate
    "ignore:There is no current event loop:DeprecationWarning", # TODO: placeholder during MAITE 8 upgrade.  If upgrade does not fix, resolve explicitly or open new GLab issue
    "ignore: Item .* is using the `ReadOnly` qualifier. Pydantic will not protect items from any mutation on dictionary instances."
]
xfail_strict = true
