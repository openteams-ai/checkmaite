[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "jatic-ri"
description = "JATIC Reference Implementation"
authors = ["JATIC Developers"]
version = "0.0.1"
readme = "README.md"
packages =[{include="jatic_ri", from="src"}]
keywords = [
    "jatic",
    "artificial intelligence",
    "testing and evaluation",
    "object detection",
    "image classification",
    ]
license = "TBD"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]

[tool.poetry.dependencies]
python = ">=3.9, <3.12"                                     # required by SDP

# jatic tools
dataeval = {version = "0.75"}
gradient = {git = "https://gitlab.jatic.net/jatic/morse/gradient.git", tag="0.10.1"}
heart-library = "==0.4.4"
maite = {version = "==0.6.0"}                     # required by SDP
nrtk = {version = "==0.15.1", extras = ["headless"]}
pybsm = "==0.8.0"                                 # optional dep for nrtk, required here
reallabel = {git = "https://gitlab.jatic.net/jatic/morse/reallabel.git", tag="0.5.0"}
survivor = {git = "https://gitlab.jatic.net/jatic/morse/survivor.git", tag="0.3.1"}
xaitk-jatic = {version = "==0.4.3", extras = ["docker"]}  # docker extra required for panel apps
# external deps
holoviews = ">=1.20.0"                                      # arbitrary pin, required for panel pipelines
matplotlib = ">=3.8.4"                                      # arbitrary, required by panel
more-itertools = ">=10.0"                                   # arbitrary, used by linting test stage
opencv-python-headless = {version = ">=4.9.0.80"}           # necessary pin, required by nrtk usage here
Pillow = ">=11.0.0"                                         # arbitrary
panel = ">=1.4.5"                                           # arbitrary pin
zstandard = "^0.23.0"                                       # arbitrary, used for zip compression of json

# development dependencies
[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
pre-commit = ">=3.0.0"                                      # arbitrary pin
pyright = {version = ">=1.1.320", extras = ["nodejs"]}      # arbitrary pin
pyspark = '>=3.5.3'                                         # arbitrary pin
pytest = ">=8.3.0"                                          # necessary pin for compatibility
pytest-cov = ">=4.0.0"                                      # arbitrary pin
pytest-mock = ">=3.6.1"                                     # arbitrary, needed to test heart_app
torch = ">=2.2.0"                                           # necessary pin (at least >=2.2.0 for security)
torchmetrics = ">=1.4.0"                                    # arbitrary pin, pkg needed to run tests using example MAITE-wrapped objects.

# documentation dependencies
[tool.poetry.group.docs]
optional = true

[tool.poetry.group.docs.dependencies]
mkdocs = ">=1.6.1"  # arbitrary
mkdocs-jupyter = ">=0.25"  # arbitrary

[tool.bandit]
exclude_dirs = [
    "tests",
]

[tool.pyright]
reportMissingImports = "warning"
reportUnnecessaryTypeIgnoreComment = "error"
include = [
    "src",
    "tests",
]
exclude = [
    "**/_panel",
]

# Ruff rules - https://docs.astral.sh/ruff/rules/
[tool.ruff]
exclude = [
  "environment*",
  "tests",
]

line-length = 120  # feel free to change line length per [line length guidelines](#cr-1-pep-8).
indent-width = 4

# Assume Python 3.9
target-version = "py39"

extend-include = ["*.ipynb"]

[tool.ruff.lint]
select = ["F", "E", "W", "C90", "I", "N", "D1", "D200", "D201", "D211", "D403", "D419", "UP",
          "YTT", "ANN", "S",  "BLE", "B", "A", "COM", "C4", "T10", "ISC", "ICN", "PYI", "PT", "Q",
          "RSE", "RET", "SLF", "SIM", "TID252", "ARG", "FIX", "PD", "FLY", "NPY", "RUF027",
          "RUF100", "PERF"]

ignore = ["ANN101", "ANN102", "COM812", "ISC001"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.extend-per-file-ignores]
"**/tests/*" = ["ANN001", "ANN204", "D100", "D103", "S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.ruff.lint.isort]
known-first-party = ["jatic_ri"]

# [tool.ruff.lint.mccabe]
# # Flag errors (`C901`) whenever the complexity level exceeds 5.
# max-complexity = 5

[tool.ruff.lint.pydocstyle]
convention = "numpy"
