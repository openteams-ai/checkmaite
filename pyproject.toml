[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "jatic-ri"
description = "JATIC Reference Implementation"
authors = ["JATIC Developers"]
version = "0.0.1"
readme = "README.md"
packages =[{include="jatic_ri", from="src"}]
keywords = [
    "jatic", 
    "artificial intelligence",
    "testing and evaluation", 
    "object detection",
    "image classification",
    ]
license = "TBD"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]

[tool.poetry.dependencies]
python = ">=3.9, <3.12"  # required by SDP
maite = ">=0.6.0"  # required by SDP

# development dependencies
[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
pre-commit = ">=3.0.0"  # arbitrary
pytest = ">=8.3.0"  # necessary
pytest-cov = ">=4.0.0"  # arbitrary

# documentation dependencies
[tool.poetry.group.docs]
optional = true

[tool.poetry.group.docs.dependencies]
mkdocs = ">=1.6.1"  # arbitrary

# Ruff rules - https://docs.astral.sh/ruff/rules/
[tool.ruff]
exclude = [
  "*env*",
  "tests",
]

line-length = 120  # feel free to change line length per [line length guidelines](#cr-1-pep-8).
indent-width = 4

# Assume Python 3.9
target-version = "py39"

extend-include = ["*.ipynb"]

[tool.ruff.lint]
select = ["F", "E", "W", "C90", "I", "N", "D1", "D200", "D201", "D211", "D403", "D419", "UP",
          "YTT", "ANN", "S",  "BLE", "B", "A", "COM", "C4", "T10", "ISC", "ICN", "PYI", "PT", "Q",
          "RSE", "RET", "SLF", "SIM", "TID252", "ARG", "FIX", "PD", "FLY", "NPY", "RUF027",
          "RUF100", "PERF"]

ignore = ["ANN101","ANN102"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.pyright]
reportMissingImports = "warning"
exclude = [
    "tests/**",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.ruff.lint.isort]
known-first-party = ["jatic_ri"]

# [tool.ruff.lint.mccabe]
# # Flag errors (`C901`) whenever the complexity level exceeds 5.
# max-complexity = 5

[tool.ruff.lint.pydocstyle]
convention = "numpy"
