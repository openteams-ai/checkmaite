site_name: JATIC Reference Implementation
site_url: https://jatic.pages.jatic.net/reference-implementation/reference-implementation/
use_directory_urls: false
theme: 
  name: material
  favicon: assets/favicon.ico
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.indexes
    - toc.integrate
  palette: 
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
      primary: black
      accent: indigo

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: black
      accent: indigo

nav:  # navigation links on sidebar
  - Home: index.md
  - Explanations:
    - explanations/index.md
  - How-tos:
    - how-tos/index.md
    - Object Detection Workflow via API: how-tos/ri_api_od.ipynb
    - Image Classification Workflow via API: how-tos/ri_api_ic.ipynb
  - Tutorials:
    - tutorials/index.md
    - Dataeval tutorials:
      - Bias: tutorials/dataeval_bias_tutorial.ipynb
      - Feasibility: tutorials/dataeval_feasibility_tutorial.ipynb
      - Linting: tutorials/dataeval_linting_tutorial.ipynb
      - Shift: tutorials/dataeval_shift_tutorial.ipynb
    - NRTK Tutorial: tutorials/nrtk_tutorial.ipynb
    - RealLabel Tutorial: tutorials/reallabel_tutorial.ipynb
    - Survivor Tutorial: tutorials/survivor_tutorial.ipynb
    - XAITK Tutorial: tutorials/xaitk_tutorial.ipynb

  - Reference:
    - Conventions: reference/conventions.md
    - Development Strategy: reference/development.md
    - Persona: reference/persona.md
  - Community:
    - Setup: community/setup.md
    - Contributing: community/contributing.md
markdown_extensions:
  - admonition  # enables callout boxes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


plugins:
  - mkdocs-jupyter:
      execute: true
      kernel_name: python3
      allow_errors: false
  - search

exclude_docs: |
  reference/examples
