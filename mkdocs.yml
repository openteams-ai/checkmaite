site_name: JATIC Reference Implementation
site_url: https://jatic.pages.jatic.net/reference-implementation/reference-implementation/
use_directory_urls: false
theme: 
  name: material
  favicon: assets/favicon.ico
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.indexes
    - toc.integrate
  palette: 
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
      primary: black
      accent: indigo

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: black
      accent: indigo

nav:  # navigation links on sidebar
  - Home: index.md
  - Explanations:
    - explanations/index.md
  - How-tos:
    - how-tos/index.md
    - Dataset Analysis Configuration: how-tos/dataset_analysis_configuration.ipynb
    - Dataset Analysis Testbed: how-tos/Dataset_Analysis_Testbed.ipynb
    - Model Evaluation Configuration: how-tos/model_evaluation_configuration.ipynb
    - Model Evaluation Testbed: how-tos/Model_Evaluation_Testbed.ipynb
  - Tutorials:
    - tutorials/index.md
    - RealLabel Tutorial: tutorials/reallabel_tutorial.ipynb
  - Reference:
    - Conventions: reference/conventions.md
    - Development Strategy: reference/development.md
    - Persona: reference/persona.md
  - Community:
    - Contributing: community/contributing.md
markdown_extensions:
  - admonition  # enables callout boxes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


plugins:
  - mkdocs-jupyter:
      execute: true
      kernel_name: python3
  - search

exclude_docs: |
  reference/examples
