workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - lint
  - pyright
  - test
  - security-scan

.conda_setup:
  parallel:
    matrix:
      - VERSION: ["3.9", "3.10", "3.11"]
  before_script:
    - curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
    - eval "$(./bin/micromamba shell hook -s posix)"
    - micromamba create -f environment.yml -n test-env python=$VERSION
    - micromamba activate test-env
    - pip install .
    - micromamba list

test:
  extends: .conda_setup
  stage: test
  needs: []
  script:
    - pytest -vvv --cov --cov-report term --cov-report xml:coverage_report.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml

lint:
  extends: .conda_setup
  stage: lint
  needs: []
  rules:
    - if: $VERSION == "3.10"
      when: always # run the job in this case
    - when: never  # dont run in all other cases
  script:
    - pre-commit install 
    - pre-commit run --all-files --verbose

pyright:
  extends: .conda_setup
  stage: pyright
  needs: []
  rules:
    - if: $VERSION == "3.10"
      when: always # run the job in this case
    - when: never  # dont run in all other cases
  script:
    - pyright --ignoreexternal --verifytypes jatic_ri

# SECURITY STAGES
include:
- template: Jobs/SAST.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

clam-av:
  stage: security-scan
  needs: [test]
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/clamav/clamav:latest
  script:
    # update virus definitions
    - freshclam
    # run virus scan
    - clamscan -r . --infected --scan-archive=yes --log virus-scan.txt
    # determine if there are any infected files
    - NUM_INFECTED_FILES=$(awk '{if(/Infected files:/) print $3}' < virus-scan.txt)
    - status=$([ "$NUM_INFECTED_FILES" -gt 0 ] && echo 1 || echo 0)
    - exit $status
  artifacts:
    when: always
    paths:
      - virus-scan.txt

sast:
  stage: security-scan
  needs: [test]
  dependencies: []
  artifacts:
    paths:
      - gl-sast-report.json
    reports:
      sast: gl-sast-report.json

dependency_scanning:
  stage: security-scan
  needs: [test]
  dependencies: []
  artifacts:
    paths:
    - gl-dependency-scanning-report.json
    reports:
      dependency_scanning:
        - gl-dependency-scanning-report.json

secret_detection:
  stage: security-scan
  needs: [test]
  dependencies: []
  artifacts:
    paths:
    - gl-secret-detection-report.json
    reports:
      secret_detection:
        - gl-secret-detection-report.json
