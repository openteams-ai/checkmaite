workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - lint
  - pyright
  - build
  - test
  - security-scan
  - docs
  - test-poetry
  - test-poetry-optional-deps

.conda_setup:
  parallel:
    matrix:
      - VERSION: ["3.9", "3.10", "3.11"]
  before_script:
    - curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
    - eval "$(./bin/micromamba shell hook -s posix)"
    - micromamba create -f environment.yml -n test-env python=$VERSION
    - micromamba activate test-env
    - pip install .
    - micromamba list

.shared-setup:
  image: python:3.9
  interruptible: true
  allow_failure: false
  rules:
    # If changes are make to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    # If changes are pushed to the default branch.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never  # explicit fail-exclude terminal condition.
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"
  before_script:
    # For internal git dependencies
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.jatic.net".insteadof "ssh://git@gitlab.jatic.net"
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.jatic.net/".insteadOf "git@gitlab.jatic.net:"

    # Setup poetry
    - export PATH=${HOME}/.local/bin:${PATH}
    - pip install --upgrade pip
    - pip install --user -U poetry
    - poetry config --local virtualenvs.in-project true
    - poetry config --local virtualenvs.prefer-active-python true
    - python --version
    - pip --version
    - poetry --version
    - poetry check
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - .cache
    policy: pull

test:
  extends: .conda_setup
  stage: test
  needs: []
  script:
    - pytest tests -vvv --cov=jatic_ri --cov-report term --cov-report xml:coverage_report.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml

lint:
  extends: .conda_setup
  stage: lint
  needs: []
  rules:
    - if: $VERSION == "3.10"
      when: always # run the job in this case
    - when: never  # dont run in all other cases
  script:
    - pre-commit install
    - pre-commit run --all-files --verbose

pyright:
  extends: .conda_setup
  stage: pyright
  needs: []
  rules:
    - if: $VERSION == "3.10"
      when: always # run the job in this case
    - when: never  # dont run in all other cases
  script:
    - pyright --ignoreexternal --verifytypes jatic_ri

test-poetry:
  extends: .shared-setup
  stage: test-poetry
  image: python:3.10
  needs: ["lint: [3.10]", "pyright: [3.10]"]
  script:
    - poetry install --with dev
    - poetry run pytest tests -vvv --cov=jatic_ri --cov-report term

# test optional dependencies
test-poetry-optional-deps:
  extends: .shared-setup
  stage: test-poetry-optional-deps
  image: python:3.10
  needs: ["lint: [3.10]", "pyright: [3.10]"]
  script:
    - poetry install --with dev,docs
    - poetry check
    - poetry run pytest tests -vvv --cov=jatic_ri --cov-report term


# DOCUMENTATION
# deploy docs for merge requests
pages-branch:
  extends: .shared-setup
  stage: docs
  artifacts:
      expose_as: 'Documentation Build'
      paths:
        - public/
  environment:
      name: docs-preview/$CI_MERGE_REQUEST_IID
      url: "https://jatic.pages.jatic.net/-/increment-demos/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
      auto_stop_in: 1 week
  script:
    - poetry install --with docs
    - poetry run mkdocs build -d public --no-directory-urls
  variables:
      PUBLIC_URL: "/-/increment-demos/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/"
  rules:
    # If changes are make to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    # Don't run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never

# deploy production docs on merge with main
pages: # this must be named "pages" to get GitLab to run "pages:deploy"
  extends: .shared-setup
  stage: docs
  script:
    - poetry install --with docs
    - poetry run mkdocs build -d public --no-directory-urls
  artifacts:
    paths:
    - public
  rules:
    # Only run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


# SECURITY STAGES
include:
- template: Jobs/SAST.gitlab-ci.yml
- template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
- template: Jobs/Secret-Detection.gitlab-ci.yml

clam-av:
  stage: security-scan
  needs: [test]
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/clamav/clamav:latest
  script:
    # update virus definitions
    - freshclam
    # run virus scan
    - clamscan -r . --infected --scan-archive=yes --log virus-scan.txt
    # determine if there are any infected files
    - NUM_INFECTED_FILES=$(awk '{if(/Infected files:/) print $3}' < virus-scan.txt)
    - status=$([ "$NUM_INFECTED_FILES" -gt 0 ] && echo 1 || echo 0)
    - exit $status
  artifacts:
    when: always
    paths:
      - virus-scan.txt

sast:
  stage: security-scan
  needs: [test]
  dependencies: []
  artifacts:
    paths:
      - gl-sast-report.json
    reports:
      sast: gl-sast-report.json

gemnasium-python-dependency_scanning:
  stage: security-scan
  needs: [test]
  allow_failure: false
  variables:
    DEPENDENCY_SCANNING_DISABLED: "false"
    DS_INCLUDE_DEV_DEPENDENCIES: "false"
  rules:
    # If changes are make to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
  artifacts:
    paths:
    - gl-dependency-scanning-report.json
    - gl-sbom-pypi-poetry.cdx.json
    reports:
      dependency_scanning:
        - gl-dependency-scanning-report.json
      cyclonedx:
        - gl-sbom-pypi-poetry.cdx.json

secret_detection:
  stage: security-scan
  needs: [test]
  dependencies: []
  artifacts:
    paths:
    - gl-secret-detection-report.json
    reports:
      secret_detection:
        - gl-secret-detection-report.json
