workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

default:
  retry: 1
  artifacts:
    expire_in: 1 week

# Global variables
variables:
  # Defaults to false to avoid populating artifact_dir
  # (see .gitlab-ci-local-variables.yml). Temporarily override in an
  # MR for testing or via the Pipeline trigger if artifacts are needed:
  # https://gitlab.jatic.net/jatic/orchestration-interoperability/checkmaite/-/pipelines/new
  SAVE_POETRY_ARTIFACTS:
    value: "false"
    description: "Set to true to save Poetry artifacts after jobs; default is false."
  # CI resource diagnostics for troubleshooting SIGKILL / OOM runner issues.
  # Set to "false" once https://gitlab.jatic.net/jatic/devsecops/dev/-/issues/659 is resolved.
  CI_DIAGNOSTICS:
    value: "true"
    description: "Set to true to enable resource diagnostics logging in CI jobs."
  RELEASE_TAG:
    value: ""
    description: "Tag to publish to PyPI from a manually triggered web pipeline."
  CHECKMAITE_PLUGINS_INSTALL_SPEC:
    value: "checkmaite-plugins[unsupported] @ git+https://gitlab.jatic.net/jatic/orchestration-interoperability/checkmaite-plugins.git@main"
    description: "Direct install spec for checkmaite-plugins; kept out of package metadata for PyPI compatibility."


stages:
  - pre-commit
  - pyright
  - build
  - test
  - docs
  - dr-compliance
  - publish-test
  - publish

.git_config: &git_config
# For internal git dependencies
- git config --global url."https://gitlab-ci-token:${GITLAB_CI_TOKEN}@gitlab.jatic.net/".insteadOf "https://gitlab.jatic.net/"
# Trust the GitLab checkout for build backends that call git to derive package metadata.
- git config --global --add safe.directory "$CI_PROJECT_DIR"

.install_checkmaite_plugins: &install_checkmaite_plugins |
  if [ "${VERSION:-}" = "3.12" ]; then
    echo "Skipping checkmaite-plugins install on Python 3.12; checkmaite-plugins supports Python <3.12."
  else
    poetry run python -m pip install "$CHECKMAITE_PLUGINS_INSTALL_SPEC"
  fi

# Diagnostic logging for investigating CI SIGKILL / OOM issues.
# Controlled by CI_DIAGNOSTICS variable (default: true).
# See: https://gitlab.jatic.net/jatic/devsecops/dev/-/issues/659
.start_diagnostics: &start_diagnostics
- |
  if [ "$CI_DIAGNOSTICS" = "true" ]; then
    mkdir -p artifacts
    # Snapshot system info once
    {
      echo "=== CI DIAGNOSTICS ==="
      echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "Hostname: $(hostname)"
      echo "Job: ${CI_JOB_NAME:-unknown}"
      echo "Runner: ${CI_RUNNER_DESCRIPTION:-unknown}"
      echo ""
      echo "=== CPU ==="
      nproc
      cat /proc/cpuinfo | grep 'model name' | head -1 || true
      echo ""
      echo "=== MEMORY ==="
      free -m
      echo ""
      echo "=== DISK ==="
      df -h
      echo ""
      echo "=== CGROUP MEMORY LIMITS ==="
      cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.max 2>/dev/null || echo "cgroup memory limit: not available"
      cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.current 2>/dev/null || echo "cgroup memory usage: not available"
      echo ""
      echo "=== OOM SCORE ==="
      cat /proc/self/oom_score 2>/dev/null || echo "oom_score: not available"
      cat /proc/self/oom_score_adj 2>/dev/null || echo "oom_score_adj: not available"
      echo ""
      echo "=== KERNEL OOM HISTORY ==="
      dmesg 2>/dev/null | grep -i -E "oom|killed|out of memory" | tail -20 || echo "dmesg: not available (no permissions)"
    } > artifacts/ci-diagnostics.txt 2>&1
    # Start background resource monitor (logs every 30s)
    (while true; do
      echo "--- $(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
      free -m | grep Mem
      df -h / | tail -1
      cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null | awk '{printf "cgroup mem: %.0f MB\n", $1/1024/1024}' || true
    done >> artifacts/resource-monitor.txt 2>&1) &
    echo $! > /tmp/monitor_pid
    echo "Diagnostics started (PID: $(cat /tmp/monitor_pid))"
  fi

.python-matrix:
  parallel:
    matrix:
      - VERSION: ["3.10", "3.11", "3.12"]
  image: python:$VERSION

.shared-setup:
  interruptible: true
  allow_failure: false
  rules:
    # If changes are made to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    # If changes are pushed to the default branch.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never  # explicit fail-exclude terminal condition.
  variables:
    ARTIFACT_DIR: "artifacts"  # must match test.artifacts.path below
  after_script:
    # Capture final resource state even on SIGKILL/failure
    - |
      if [ "$CI_DIAGNOSTICS" = "true" ]; then
        echo "=== FINAL STATE (after_script) ===" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "Exit reason: job ended (normal, error, or killed)" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        free -m >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        df -h >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "=== DMESG (final) ===" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        dmesg 2>/dev/null | grep -i -E "oom|killed|out of memory" | tail -20 >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        # Stop monitor
        kill $(cat /tmp/monitor_pid 2>/dev/null) 2>/dev/null || true
      fi
  artifacts:
    when: always
    paths:
      - artifacts/*

.conda-setup:
  # Overrides the image from .python-matrix; Python version is
  # installed via micromamba create python=$VERSION instead
  image: mambaorg/micromamba:2.5-amazon2023
  cache:
    - key:
        files:
          - conda-lock.yml
        prefix: conda-env-py${VERSION}
      paths:
        - .conda-env/
  before_script:
    # Diagnostics skipped in conda jobs — mambaorg/micromamba image lacks standard Linux tools (free, nproc, df)
    - export CONDA_ENV_NAME='test-env' CONDA_LOCK_ARGS='--micromamba'
    - micromamba --version
    - micromamba create -y -n $CONDA_ENV_NAME -c conda-forge python=$VERSION conda-lock=3 git
    - eval "$(micromamba shell hook --shell bash)"
    - micromamba activate $CONDA_ENV_NAME
    - *git_config
    # Regenerate conda-lock.yml from pyproject.toml so dynamic-conda-test
    # exercises a freshly resolved lockfile (catches upstream dep drift).
    - conda-lock $CONDA_LOCK_ARGS -f pyproject.toml --filter-extras --extras dev -p linux-64 --lockfile conda-lock.yml
    - conda-lock install -n $CONDA_ENV_NAME $CONDA_LOCK_ARGS conda-lock.yml
    - pip install . --no-deps
    - micromamba list

.poetry-setup:
  # GitLab cache intentionally disabled — see !541 for benchmark rationale.
  before_script:
    - *git_config
    - *start_diagnostics
    - export PATH=${HOME}/.local/bin:${PATH}
    - pip install --upgrade pip
    - pip install --user -U poetry==2.1.2
    - poetry config virtualenvs.in-project true
    - python --version
    - pip --version
    - poetry --version
    - poetry check

test:
  extends: [.python-matrix, .shared-setup, .poetry-setup]
  stage: test
  needs: []
  timeout: 3h
  variables:
    PYTEST_OPTS: --cov-report xml:coverage_report.xml --cov-fail-under=90
  script:
    - poetry install --with dev --extras "ui onnx"
    - *install_checkmaite_plugins
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/nrtk_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/xaitk_app.py --ci
    - poetry run pytest tests -vvv --cov=checkmaite --cov-report term-missing $PYTEST_OPTS

  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml
    paths:
      - artifacts/*

# build fresh conda-lock file, create env from it, and activate it.
# .python-matrix sets the image to python:$VERSION, but .conda-setup overrides
# it with mambaorg/micromamba:2.5-amazon2023.
# python is installed via `micromamba create python=$VERSION`
dynamic-conda-test:
  extends: [.python-matrix, .shared-setup, .conda-setup]
  stage: test
  needs: []
  script:
    - pytest tests -vvv --cov=checkmaite --cov-report term-missing --cov-report xml:coverage_report.xml

# build conda env from conda-lock in the repo and activate it
conda-lock-test:
  extends: [.shared-setup]
  stage: test
  needs: []
  image: mambaorg/micromamba:2.5-amazon2023
  cache:
    - key:
        files:
          - conda-lock.yml
        prefix: conda-lock-env
      paths:
        - .conda-env/
  before_script:
    # Diagnostics skipped in conda jobs — mambaorg/micromamba image lacks standard Linux tools (free, nproc, df)
    - export CONDA_ENV_NAME='test-env' CONDA_LOCK_ARGS='--micromamba'
    - micromamba --version
    - micromamba create -y -n $CONDA_ENV_NAME -c conda-forge conda-lock=3 git
    - eval "$(micromamba shell hook --shell bash)"
    - micromamba activate $CONDA_ENV_NAME
    - *git_config
    - conda-lock install -n $CONDA_ENV_NAME $CONDA_LOCK_ARGS conda-lock.yml
    - pip install . --no-deps
    - micromamba list
  script:
    - pytest tests -vvv --cov=checkmaite --cov-report term-missing

pyright-internal:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: pyright
  needs: []
  script:
    - poetry install --with dev  --extras ui
    - poetry run pyright src/

# DOCUMENTATION
# deploy docs for merge requests
pages-branch:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: docs
  needs: []
  artifacts:
      expose_as: 'Documentation Build'
      paths:
        - public/
  environment:
      name: docs-preview/$CI_MERGE_REQUEST_IID
      url: "https://jatic.pages.jatic.net/-/orchestration-interoperability/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
      auto_stop_in: 1 week
  script:
    - poetry install --with docs --extras onnx --no-cache
    - poetry run mkdocs build -d public --no-directory-urls
  variables:
      PUBLIC_URL: "/-/orchestration-interoperability/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/"
  rules:
    # If changes are made to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Don't run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never

# deploy production docs on merge with main
pages: # this must be named "pages" to get GitLab to run "pages:deploy"
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: docs
  script:
    - poetry install --with docs --extras onnx --no-cache
    - poetry run mkdocs build -d public --no-directory-urls
    - rm -rf public/how-tos/tscache
    - rm -rf public/how-tos/visdrone_model_weights
  artifacts:
    paths:
    - public
  rules:
    # Only run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Publish releases from self-managed GitLab. PyPI uses Trusted Publishing
# (OIDC); TestPyPI uses TEST_PYPI_API_TOKEN because PyPI/TestPyPI do not trust
# self-managed GitLab issuers for Trusted Publishing.
.publish-python-package:
  stage: publish
  image: python:3.10
  retry: 0
  interruptible: false
  resource_group: pypi-publish
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: never
  variables:
    GIT_DEPTH: "0"
  before_script:
    - *git_config
    - export PATH=${HOME}/.local/bin:${PATH}
    - pip install --upgrade pip
    - pip install --user "poetry==2.1.2" "twine==6.2.0" "check-wheel-contents==0.6.3"
    - python --version
    - poetry --version
    - twine --version
    - check-wheel-contents --version
  script:
    - |
      set -euo pipefail

      if [ -z "${RELEASE_TAG:-}" ]; then
        echo "RELEASE_TAG must be set in the 'Run pipeline' form (CI/CD -> Pipelines -> Run pipeline)."
        exit 1
      fi

      RELEASE_TAG="$(printf '%s' "$RELEASE_TAG" | tr -d '[:space:]')"
      if ! [[ "$RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
        echo "RELEASE_TAG '$RELEASE_TAG' must match X.Y.Z with no 'v' prefix."
        exit 1
      fi

      if [ "${PYPI_ENVIRONMENT_NAME}" = "TestPyPI" ]; then
        if [ -z "${TEST_PYPI_API_TOKEN:-}" ]; then
          echo "TEST_PYPI_API_TOKEN is not available; add a masked/protected TestPyPI API token in GitLab CI/CD variables."
          exit 1
        fi
        export TWINE_USERNAME="__token__"
        export TWINE_PASSWORD="$TEST_PYPI_API_TOKEN"
      else
        if [ -z "${PYPI_ID_TOKEN:-}" ]; then
          echo "PYPI_ID_TOKEN is not available; check the job id_tokens configuration and the PyPI trusted publisher setup."
          exit 1
        fi
      fi

      echo "Publish to ${PYPI_ENVIRONMENT_NAME} triggered by ${GITLAB_USER_LOGIN:-unknown} (${GITLAB_USER_EMAIL:-unknown}) at $(date -u +%FT%TZ)."

      git fetch --no-tags origin "+refs/heads/${CI_DEFAULT_BRANCH}:refs/remotes/origin/${CI_DEFAULT_BRANCH}"

      REMOTE_TAG_OBJECT="$(git ls-remote --tags --refs origin "refs/tags/${RELEASE_TAG}" | awk 'NF {print $1; exit}')"
      if [ -z "$REMOTE_TAG_OBJECT" ]; then
        echo "RELEASE_TAG '$RELEASE_TAG' not found on origin."
        exit 1
      fi

      if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
        LOCAL_TAG_OBJECT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}")"
        if [ "$LOCAL_TAG_OBJECT" != "$REMOTE_TAG_OBJECT" ]; then
          echo "Tag '$RELEASE_TAG' on origin ($REMOTE_TAG_OBJECT) does not match local ($LOCAL_TAG_OBJECT); refusing to publish."
          exit 1
        fi
      else
        git fetch --no-tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
      fi

      TAG_COMMIT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
      echo "Publishing ${RELEASE_TAG} (${TAG_COMMIT}) to ${PYPI_ENVIRONMENT_NAME}."

      if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${CI_DEFAULT_BRANCH}"; then
        echo "RELEASE_TAG ${RELEASE_TAG} (${TAG_COMMIT}) is not on origin/${CI_DEFAULT_BRANCH}."
        exit 1
      fi

      rm -rf dist/
      git checkout --detach "$TAG_COMMIT"
      poetry build
      twine check dist/*
      check-wheel-contents dist/*.whl
      python - "$RELEASE_TAG" <<'PY'
      import sys
      from pathlib import Path
      from packaging.utils import parse_sdist_filename, parse_wheel_filename
      from packaging.version import Version

      expected = Version(sys.argv[1])
      matched = 0
      for artifact in Path("dist").iterdir():
          if artifact.suffix == ".whl":
              _, version, _, _ = parse_wheel_filename(artifact.name)
          elif artifact.name.endswith(".tar.gz"):
              _, version = parse_sdist_filename(artifact.name)
          else:
              continue
          matched += 1
          if version != expected:
              raise SystemExit(
                  f"Built artifact {artifact.name} has version {version}, expected tag version {expected}."
              )

      if matched == 0:
          raise SystemExit("No wheel or sdist artifacts were built in dist/.")
      print(f"Verified {matched} artifact(s) for version {expected}.")
      PY
      twine upload --non-interactive --disable-progress-bar dist/*

publish-testpypi:
  extends: .publish-python-package
  stage: publish-test
  environment:
    name: pypi-test
    url: https://test.pypi.org/project/checkmaite/
  variables:
    PYPI_ENVIRONMENT_NAME: "TestPyPI"
    TWINE_REPOSITORY_URL: "https://test.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never

publish-pypi:
  extends: .publish-python-package
  environment:
    name: pypi-production
    url: https://pypi.org/project/checkmaite/
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  variables:
    PYPI_ENVIRONMENT_NAME: "PyPI"
    TWINE_REPOSITORY_URL: "https://upload.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never


# SECURITY STAGES
include:
  - component: gitlab.jatic.net/jatic/devsecops/components/pre-commit@1.1.0
    inputs:
      stage: pre-commit
      project_path: "jatic/orchestration-interoperability/checkmaite"
      allow_failure: false

  - component: gitlab.jatic.net/jatic/devsecops/components/dr-compliance@0.5.2
    inputs:
      stage: dr-compliance
      sast_excluded_paths: tests
      sast_search_max_depth: "4"
      image: harbor.jatic.net:443/platform-team/base-images/python-base-image:3.11
      full_execution_on_commit: true # set full_execution_on_commit: true to run the component on every pushed commit
      allow_failure: true
