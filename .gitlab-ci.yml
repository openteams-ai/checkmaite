workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

default:
  retry: 1
  artifacts:
    expire_in: 1 week

# Global variables
variables:
  # Defaults to false to avoid populating artifact_dir
  # (see .gitlab-ci-local-variables.yml). Temporarily override in an
  # MR for testing or via the Pipeline trigger if artifacts are needed:
  # https://gitlab.jatic.net/jatic/reference-implementation/reference-implementation/-/pipelines/new
  SAVE_POETRY_ARTIFACTS:
    value: "false"
    description: "Set to true to save Poetry artifacts after jobs; default is false."
  # CI resource diagnostics for troubleshooting SIGKILL / OOM runner issues.
  # Set to "false" once https://gitlab.jatic.net/jatic/devsecops/dev/-/issues/659 is resolved.
  CI_DIAGNOSTICS:
    value: "true"
    description: "Set to true to enable resource diagnostics logging in CI jobs."


stages:
  - lint
  - pyright
  - build
  - test
  - docs
  - dr-compliance

.git_config: &git_config
# For internal git dependencies
- git config --global url."https://gitlab-ci-token:${GITLAB_CI_TOKEN}@gitlab.jatic.net/".insteadOf "https://gitlab.jatic.net/"

# Diagnostic logging for investigating CI SIGKILL / OOM issues.
# Controlled by CI_DIAGNOSTICS variable (default: true).
# See: https://gitlab.jatic.net/jatic/devsecops/dev/-/issues/659
.start_diagnostics: &start_diagnostics
- |
  if [ "$CI_DIAGNOSTICS" = "true" ]; then
    mkdir -p artifacts
    # Snapshot system info once
    {
      echo "=== CI DIAGNOSTICS ==="
      echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "Hostname: $(hostname)"
      echo "Job: ${CI_JOB_NAME:-unknown}"
      echo "Runner: ${CI_RUNNER_DESCRIPTION:-unknown}"
      echo ""
      echo "=== CPU ==="
      nproc
      cat /proc/cpuinfo | grep 'model name' | head -1 || true
      echo ""
      echo "=== MEMORY ==="
      free -m
      echo ""
      echo "=== DISK ==="
      df -h
      echo ""
      echo "=== CGROUP MEMORY LIMITS ==="
      cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.max 2>/dev/null || echo "cgroup memory limit: not available"
      cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.current 2>/dev/null || echo "cgroup memory usage: not available"
      echo ""
      echo "=== OOM SCORE ==="
      cat /proc/self/oom_score 2>/dev/null || echo "oom_score: not available"
      cat /proc/self/oom_score_adj 2>/dev/null || echo "oom_score_adj: not available"
      echo ""
      echo "=== KERNEL OOM HISTORY ==="
      dmesg 2>/dev/null | grep -i -E "oom|killed|out of memory" | tail -20 || echo "dmesg: not available (no permissions)"
    } > artifacts/ci-diagnostics.txt 2>&1
    # Start background resource monitor (logs every 30s)
    (while true; do
      echo "--- $(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
      free -m | grep Mem
      df -h / | tail -1
      cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null | awk '{printf "cgroup mem: %.0f MB\n", $1/1024/1024}' || true
    done >> artifacts/resource-monitor.txt 2>&1) &
    echo $! > /tmp/monitor_pid
    echo "Diagnostics started (PID: $(cat /tmp/monitor_pid))"
  fi

.python-matrix:
  parallel:
    matrix:
      - VERSION: ["3.10", "3.11", "3.12"]
  image: python:$VERSION

.shared-setup:
  interruptible: true
  allow_failure: false
  rules:
    # If changes are made to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    # If changes are pushed to the default branch.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never  # explicit fail-exclude terminal condition.
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"
    ARTIFACT_DIR: "artifacts"  # must match test.artifacts.path below
  after_script:
    # Capture final resource state even on SIGKILL/failure
    - |
      if [ "$CI_DIAGNOSTICS" = "true" ]; then
        echo "=== FINAL STATE (after_script) ===" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "Exit reason: job ended (normal, error, or killed)" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        free -m >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        df -h >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        echo "=== DMESG (final) ===" >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        dmesg 2>/dev/null | grep -i -E "oom|killed|out of memory" | tail -20 >> artifacts/ci-diagnostics.txt 2>/dev/null || true
        # Stop monitor
        kill $(cat /tmp/monitor_pid 2>/dev/null) 2>/dev/null || true
      fi
  artifacts:
    when: always
    paths:
      - artifacts/*

.conda-setup:
  # Overrides the image from .python-matrix; Python version is
  # installed via micromamba create python=$VERSION instead
  image: mambaorg/micromamba:2.5-amazon2023
  cache:
    - key:
        files:
          - conda-lock.yml
        prefix: conda-env-py${VERSION}
      paths:
        - .conda-env/
  before_script:
    # Diagnostics skipped in conda jobs — mambaorg/micromamba image lacks standard Linux tools (free, nproc, df)
    - export CONDA_ENV_NAME='test-env' CONDA_LOCK_ARGS='--micromamba'
    - micromamba --version
    - micromamba create -y -n $CONDA_ENV_NAME -c conda-forge python=$VERSION conda-lock=3 git make
    - eval "$(micromamba shell hook --shell bash)"
    - micromamba activate $CONDA_ENV_NAME
    - *git_config
    - make conda-lock  # regenerate conda-lock file with latest conda dependencies
    - make conda-env   # create conda env from new conda-lock file
    - pip install . --no-deps
    - micromamba list

.poetry-setup:
  cache:
    - key:
        files:
          - poetry.lock
        prefix: venv-py${VERSION}
      paths:
        - .venv/
    - key: pip-downloads
      paths:
        - .cache/pip
  before_script:
    - *git_config
    - *start_diagnostics
    - export PATH=${HOME}/.local/bin:${PATH}
    - pip install --upgrade pip
    - pip install --user -U poetry==2.1.2

    # openjdk-17-jre isn't present on all base images, we require it for reallabel and survivor
    # Adoptium seems to be the preferred build for specific Java runtimes
    # we need to add the Adoptium repo before installing, and we also need the signing key to
    # guarantee supply-chain integrity (at least, this is recommended!). VERSION_CODENAME is
    # the Debian codename e.g. bookworm. Setting JAVA_HOME is required for finding Java, and
    # the command below appears to be the most robust way to do this. Setting the PATH is
    # probably not strictly necessary, but it doesn't hurt (I hope!)
    - apt-get update && apt-get install -y --no-install-recommends wget gnupg ca-certificates
    - wget -qO- https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor -o /usr/share/keyrings/adoptium.gpg
    - echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(. /etc/os-release; echo $VERSION_CODENAME) main" > /etc/apt/sources.list.d/adoptium.list
    - apt-get update && apt-get install -y --no-install-recommends temurin-17-jre
    - export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
    - export PATH="$JAVA_HOME/bin:$PATH"
    - java -version

    - poetry config virtualenvs.in-project true
    - poetry config repositories.gradient https://gitlab.jatic.net/jatic/morse/gradient.git
    - poetry config repositories.reallabel https://gitlab.jatic.net/jatic/morse/reallabel.git
    - poetry config repositories.survivor https://gitlab.jatic.net/jatic/morse/survivor.git
    - poetry config repositories.heart https://gitlab.jatic.net/jatic/ibm/hardened-extension-adversarial-robustness-toolbox.git
    - poetry config http-basic.gradient x-token-auth ${GITLAB_CI_TOKEN}
    - poetry config http-basic.reallabel x-token-auth ${GITLAB_CI_TOKEN}
    - poetry config http-basic.survivor x-token-auth ${GITLAB_CI_TOKEN}
    - poetry config http-basic.heart x-token-auth ${GITLAB_CI_TOKEN}
    - python --version
    - pip --version
    - poetry --version
    - poetry check

test:
  extends: [.python-matrix, .shared-setup, .poetry-setup]
  stage: test
  needs: []
  timeout: 3h
  variables:
    PYTEST_OPTS: --cov-report xml:coverage_report.xml --cov-fail-under=90
  script:
    - poetry install --with dev --extras ui
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/nrtk_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/xaitk_app.py --ci
    - poetry run pytest tests -vvv --cov=checkmaite --cov-report term-missing $PYTEST_OPTS

  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml
    paths:
      - artifacts/*

# build fresh conda-lock file, create env from it, and activate it.
# .python-matrix sets the image to python:$VERSION, but .conda-setup overrides
# it with mambaorg/micromamba:2.5-amazon2023.
# python is installed via `micromamba create python=$VERSION`
dynamic-conda-test:
  extends: [.python-matrix, .shared-setup, .conda-setup]
  stage: test
  needs: []
  script:
    - pytest tests -vvv --cov=checkmaite --cov-report term-missing --cov-report xml:coverage_report.xml

# build conda env from conda-lock in the repo and activate it
conda-lock-test:
  extends: [.shared-setup]
  stage: test
  needs: []
  image: mambaorg/micromamba:2.5-amazon2023
  cache:
    - key:
        files:
          - conda-lock.yml
        prefix: conda-lock-env
      paths:
        - .conda-env/
  before_script:
    # Diagnostics skipped in conda jobs — mambaorg/micromamba image lacks standard Linux tools (free, nproc, df)
    - export CONDA_ENV_NAME='test-env' CONDA_LOCK_ARGS='--micromamba'
    - micromamba --version
    - micromamba create -y -n $CONDA_ENV_NAME -c conda-forge conda-lock=3 git make
    - eval "$(micromamba shell hook --shell bash)"
    - micromamba activate $CONDA_ENV_NAME
    - *git_config
    - make conda-env  # create conda env from conda-lock file
    - pip install . --no-deps
    - micromamba list
  script:
    - pytest tests -vvv --cov=checkmaite --cov-report term-missing --cov-report xml:coverage_report.xml

lint:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: lint
  needs: []
  script:
    - poetry install --with dev --extras ui
    - poetry run pre-commit install
    - poetry run pre-commit run --all-files --verbose

pyright-internal:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: pyright
  needs: []
  script:
    - poetry install --with dev  --extras ui
    - poetry run pyright src/

# DOCUMENTATION
# deploy docs for merge requests
pages-branch:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: docs
  needs: []
  artifacts:
      expose_as: 'Documentation Build'
      paths:
        - public/
  environment:
      name: docs-preview/$CI_MERGE_REQUEST_IID
      url: "https://jatic.pages.jatic.net/-/reference-implementation/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
      auto_stop_in: 1 week
  script:
    - poetry install --with docs
    - poetry run mkdocs build -d public --no-directory-urls
  variables:
      PUBLIC_URL: "/-/reference-implementation/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/"
  rules:
    # If changes are made to an active merge request.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Don't run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never

# deploy production docs on merge with main
pages: # this must be named "pages" to get GitLab to run "pages:deploy"
  extends: [.shared-setup, .poetry-setup]
  image: python:3.10
  stage: docs
  script:
    - poetry install --with docs
    - poetry run mkdocs build -d public --no-directory-urls
    - rm -rf public/how-tos/tscache
    - rm -rf public/how-tos/visdrone_model_weights
  artifacts:
    paths:
    - public
  rules:
    # Only run this rule if on main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


# SECURITY STAGES
include:
  - component: gitlab.jatic.net/jatic/devsecops/components/dr-compliance@0.5.2
    inputs:
      stage: dr-compliance
      sast_excluded_paths: tests
      sast_search_max_depth: "4"
      image: harbor.jatic.net:443/platform-team/base-images/python-base-image:3.11
      full_execution_on_commit: true # set full_execution_on_commit: true to run the component on every pushed commit
      allow_failure: true


#########################################
# Nightly runs (Deprecated packages only)
#########################################

nightly-unsupported:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.11
  stage: test
  needs: []
  timeout: 4h
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
    - when: never
  variables:
    PYTEST_OPTS: --cov-report xml:coverage_report.xml --cov-fail-under=90
  script:
    # Install dev + unsupported groups (poetry group)
    - poetry install --with dev  --extras ui --extras unsupported
    # Run the panel configs that are currently commented out in the regular job
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/heart_od_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/image_classification/heart_ic_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/reallabel_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/survivor_app.py --ci
    # The following to apps are also run in MRs as currently supported but rerun them here to save all artifacts together
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/nrtk_app.py --ci
    - poetry run python src/checkmaite/ui/configuration_pages/object_detection/xaitk_app.py --ci
    # Run pytest including unsupported tests (your default addopts exclude them)
    - poetry run pytest tests -vvv -m "unsupported or heart" --cov=checkmaite --cov-report=term-missing $PYTEST_OPTS
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage_report.xml
    paths:
      - artifacts/*
