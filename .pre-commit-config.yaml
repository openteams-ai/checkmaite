# Pre-commit configuration aligned with the DevSecOps pattern
# (https://gitlab.jatic.net/jatic/devsecops/example-package/-/blob/main/.pre-commit-config.yaml).
#
# Philosophy: pre-commit handles only fast, auto-fixable formatting/linting via
# ruff. Broader checks live in the DevSecOps compliance components:
#   - SAST / security  -> dsor-compliance
#   - pyproject.toml / uv / conda installability -> sr-compliance
#
# Project-specific gap-fillers (check-conda-lock, check-linter-ignore) remain
# here because no DevSecOps component covers them. Both are configured to be
# self-contained so they run inside the pre-commit component's minimal
# python-base-image on system python (no project uv env required).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6  # matches the version of Ruff in the DevSecOps Team's base images
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.9'
    hooks:
    - id: bandit
      additional_dependencies: ['.[toml]']
      args: [-c, pyproject.toml, -r, src]  # pull config from pyproject.toml and only scan `src`
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: '0.9.24'  # keep in sync with the uv version pinned in .gitlab-ci.yml
    hooks:
    - id: uv-lock
      args: [--check]  # verify uv.lock is up to date without modifying it
  - repo: local
    hooks:
       - id: check-conda-lock
         name: check conda-lock      
         language: python
         entry: python scripts/check_conda_lock.py
         pass_filenames: false
         additional_dependencies: ['conda-lock>=3,<5']

       # NOTE: invoked as plain `python`, NOT `uv run python`. pre-commit runs this
       # hook over parallel file batches; a project-env runner (`uv run`) would try
       # to create `.venv` concurrently on a cold CI runner and the parallel env
       # builds can clobber each other mid-install. The script is pure-stdlib
       # (re/sys/tokenize/dataclasses) and needs nothing from the project env, so
       # plain `python` is correct and creates no venv to race on. If this script
       # ever grows real dependencies, add them via `language: python` +
       # `additional_dependencies` (see check-conda-lock above), not `uv run`.
       - id: check-linter-ignore
         name: 'Check for non-specific linter ignores'
         entry: python scripts/check_bare_pyright_ignore.py
         types: [python]
         language: system
         exclude: check_bare_pyright_ignore.py|test_check_bare_pyright_ignore.py
